databases:
  - name: service-hub-db
    databaseName: service_hub
    plan: free
    region: oregon

services:
  - type: web
    runtime: docker
    name: service-hub-backend
    repo: https://github.com/thilakch95-gif/Service-Hub-A-Local-Service-Booking-Platform
    rootDir: backend
    plan: free
    region: oregon
    healthCheckPath: /api/auth/test
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: service-hub-db
          property: connectionString
      - key: JWT_SECRET
        value: secure_key
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: FRONTEND_URL
        value: https://service-hub-frontend.onrender.com
      - key: BACKEND_URL
        value: https://service-hub-backend.onrender.com
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: APP_ADMIN_NAME
        value: System Admin
      - key: APP_ADMIN_EMAIL
        value: admin@servicehub.com
      - key: APP_ADMIN_PASSWORD
        value: admin123
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1

  - type: web
    runtime: static
    name: service-hub-frontend
    repo: https://github.com/thilakch95-gif/Service-Hub-A-Local-Service-Booking-Platform
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://service-hub-backend.onrender.com/api
      - key: VITE_WS_BASE_URL
        value: https://service-hub-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
