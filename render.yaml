databases:
  - name: service-hub-db
    databaseName: service_hub
    plan: free
    region: oregon

services:
  - type: web
    runtime: docker
    name: service-hub-backend
    repo: https://github.com/thilakch95-gif/Service-Hub-A-Local-Service-Booking-Platform
    rootDir: backend
    plan: free
    region: oregon
    healthCheckPath: /api/auth/test
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: service-hub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: FRONTEND_URL
        value: https://service-hub-frontend.onrender.com
      - key: BACKEND_URL
        value: https://service-hub-backend-57di.onrender.com
      - key: APP_ADMIN_NAME
        value: System Admin
      - key: APP_ADMIN_EMAIL
        value: admin@servicehub.com
      - key: APP_ADMIN_PASSWORD
        value: admin123
      - key: DEMO_USER_EMAIL
        value: user@demo.com
      - key: DEMO_USER_PASSWORD
        value: User@123
      - key: DEMO_PROVIDER_EMAIL
        value: provider@demo.com
      - key: DEMO_PROVIDER_PASSWORD
        value: Provider@123
      - key: DEMO_ADMIN_EMAIL
        value: admin@demo.com
      - key: DEMO_ADMIN_PASSWORD
        value: Admin@123
  - type: web
    runtime: static
    name: service-hub-frontend
    repo: https://github.com/thilakch95-gif/Service-Hub-A-Local-Service-Booking-Platform
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://service-hub-backend-57di.onrender.com/api
      - key: VITE_WS_BASE_URL
        value: https://service-hub-backend-57di.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
