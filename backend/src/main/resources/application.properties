spring.application.name=local-service-finder-backend

server.address=0.0.0.0
server.port=${PORT:${SERVER_PORT:8080}}
server.forward-headers-strategy=framework

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.allowed-origins=${FRONTEND_URL:}
app.public-base-url=${BACKEND_URL:}
app.upload-dir=${UPLOAD_DIR:${user.dir}/uploads}

app.jwt.secret=${JWT_SECRET:supersecretkeysupersecretkeysuper1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.admin.name=${APP_ADMIN_NAME:System Admin}
app.admin.email=${APP_ADMIN_EMAIL:admin@localservice.com}
app.admin.password=${APP_ADMIN_PASSWORD:Admin@123}
